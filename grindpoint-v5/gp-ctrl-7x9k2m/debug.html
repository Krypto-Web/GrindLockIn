<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Debug — Grindpoint Admin</title>
  <!-- No index for search engines -->
  <meta name="robots" content="noindex, nofollow, noarchive"/>
  <style>
    body{font-family:monospace;background:#0b0c0e;color:#f4f4f5;padding:2rem;}
    h2{color:#f59e0b;margin-bottom:1rem;}
    .pass{color:#22c55e;}.fail{color:#ef4444;}.info{color:#a1a1aa;}
    .box{background:#1c2028;border:1px solid #27272a;border-radius:8px;padding:1rem;margin:.5rem 0;}
    pre{white-space:pre-wrap;word-break:break-all;font-size:.8rem;color:#a1a1aa;margin:.5rem 0 0;}
    a{color:#f59e0b;}
  </style>
</head>
<body>
<h2>⚡ Grindpoint — Admin Diagnostics</h2>
<p class="info">This page is for admin troubleshooting only. Results are shown below.</p>
<div id="log"></div>

<script>
/* Block in production — only allow on localhost or if admin is already logged in */
const isLocalhost = ['localhost','127.0.0.1','0.0.0.0'].includes(location.hostname);

const log = document.getElementById('log');
function row(label, ok, detail) {
  log.innerHTML += `<div class="box"><span class="${ok?'pass':'fail'}">${ok?'✅':'❌'} ${label}</span>${detail?`<pre>${detail}</pre>`:''}</div>`;
}
function info(label, detail) {
  log.innerHTML += `<div class="box"><span class="info">ℹ️ ${label}</span>${detail?`<pre>${detail}</pre>`:''}</div>`;
}

if (!isLocalhost) {
  info('Environment', 'Running on: ' + location.hostname);
}
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"
  onload="runChecks()"
  onerror="document.getElementById('log').innerHTML+='<div class=\'box\'><span class=\'fail\'>❌ Supabase CDN failed to load</span><pre>Check internet connection or CDN availability.</pre></div>'">
</script>

<script>
function runChecks() {
  row('Supabase SDK loaded', true);

  const lib = window.supabase;
  if (!lib || typeof lib.createClient !== 'function') {
    row('window.supabase.createClient', false, 'Not found. Keys: ' + Object.keys(lib||{}).join(', '));
    return;
  }
  row('window.supabase.createClient', true);

  let client;
  try {
    client = lib.createClient(
      'https://hfbquuhbfjfeiosktdhl.supabase.co',
      'sb_publishable_Mp7LjPCYeTStuHs45xjifQ_vc3B1dMQ',
      { auth: { persistSession: true, storageKey: 'gp_session' } }
    );
    row('createClient() succeeded', true);
  } catch(e) {
    row('createClient() succeeded', false, e.message);
    return;
  }

  info('Calling auth.getSession()…');
  client.auth.getSession().then(({ data, error }) => {
    if (error) { row('getSession()', false, error.message); return; }
    row('getSession() succeeded', true);

    const session = data.session;
    if (!session) {
      row('Active session', false, 'Not logged in.\n\nGo to ../login.html, sign in, then return here.');
      return;
    }
    row('Active session', true, 'Email: ' + session.user.email);

    client.from('profiles').select('*').eq('id', session.user.id).maybeSingle()
      .then(({ data: p, error: e }) => {
        if (e) { row('Profile fetch', false, e.message + '\n\nRun supabase-fix.sql in Supabase SQL Editor.'); return; }
        if (!p) { row('Profile row found', false, 'No profile for this user.\nRun supabase-fix.sql.'); return; }
        row('Profile row found', true, 'Role: ' + p.role + ' | Balance: ₦' + (p.balance||0));
        row('Role is admin', p.role === 'admin',
          p.role === 'admin'
            ? 'All good — admin panel should work.'
            : 'Fix: UPDATE profiles SET role = \'admin\' WHERE email = \'' + session.user.email + '\';'
        );
        if (p.role === 'admin') {
          log.innerHTML += `<div class="box" style="border-color:#22c55e;background:rgba(34,197,94,.06);">
            <span class="pass">🎉 Everything looks good!</span>
            <pre><a href="index.html">→ Go to Admin Dashboard</a></pre>
          </div>`;
        }
      });
  });
}
</script>
</body>
</html>
