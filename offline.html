<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>You're Offline — Grindpoint</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1.25rem;text-align:center;padding:2rem;">
  <div style="font-size:4rem;">📶</div>
  <h1 style="font-size:1.8rem;">You're Offline</h1>
  <p style="color:var(--text-secondary);max-width:340px;line-height:1.7;">
    No internet connection detected. Please check your network and try again.
    Your earned balance and progress are safely saved.
  </p>
  <button onclick="window.location.reload()" class="btn btn-primary btn-lg">
    Try Again
  </button>
  <a href="dashboard" class="btn btn-secondary">Go to Dashboard</a>
</div>
</body>
</html>
