<body>
<div class="auth-split">
  <div class="auth-panel--left">
    <div class="auth-promo__logo">
      <a href="index" class="navbar__logo">Grind<span class="logo-accent">point</span></a>
    </div>
    <div>
      <div class="auth-promo__title">Create a <span class="accent">new password</span></div>
      <div class="auth-promo__features">
        <div class="auth-promo__feature">
          <div class="auth-promo__feature-icon">🔐</div>
          <p>Use at least <strong>8 characters</strong> with letters and numbers.</p>
        </div>
        <div class="auth-promo__feature">
          <div class="auth-promo__feature-icon">💡</div>
          <p>Avoid using your <strong>name or email</strong> as your password.</p>
        </div>
      </div>
    </div>
    <p style="font-size:0.78rem;color:var(--text-muted);">© 2025 Grindpoint Nigeria Limited</p>
  </div>

  <div class="auth-panel--right">
    <div class="auth-form-wrap slide-up">
      <div class="auth-header">
        <h1>Set new password</h1>
        <p>Choose a strong new password for your Grindpoint account.</p>
      </div>

      <form class="auth-form" id="updateForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="newPassword">New Password</label>
          <div class="input-wrapper">
            <input type="password" id="newPassword" class="form-control"
              placeholder="Minimum 8 characters" autocomplete="new-password" required />
            <button type="button" class="input-toggle" id="toggleNew" aria-label="Show password">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm Password</label>
          <div class="input-wrapper">
            <input type="password" id="confirmPassword" class="form-control"
              placeholder="Re-enter your new password" autocomplete="new-password" required />
            <button type="button" class="input-toggle" id="toggleConfirm" aria-label="Show password">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <!-- Strength meter -->
        <div id="strengthMeter" style="display:none;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
            <span style="font-size:0.78rem;color:var(--text-muted);">Password strength</span>
            <span id="strengthLabel" style="font-size:0.78rem;font-weight:600;"></span>
          </div>
          <div class="progress-bar">
            <div id="strengthFill" class="progress-fill" style="transition:width 0.3s,background 0.3s;"></div>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" id="updateBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:16px;height:16px;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          Update Password
        </button>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script src="js/supabase-config.js"></script>
<script src="js/main.js"></script>
<script>
  initPasswordToggle('newPassword', 'toggleNew');
  initPasswordToggle('confirmPassword', 'toggleConfirm');

  // Password strength meter
  document.getElementById('newPassword').addEventListener('input', (e) => {
    const pw = e.target.value;
    const meter = document.getElementById('strengthMeter');
    const fill = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');

    if (!pw) { meter.style.display = 'none'; return; }
    meter.style.display = 'block';

    let score = 0;
    if (pw.length >= 8) score++;
    if (pw.length >= 12) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;

    const levels = [
      { pct: '20%', color: 'var(--error)',   text: 'Very weak',  textColor: 'var(--error)' },
      { pct: '40%', color: '#f97316',        text: 'Weak',       textColor: '#f97316' },
      { pct: '60%', color: 'var(--warning)', text: 'Fair',       textColor: 'var(--warning)' },
      { pct: '80%', color: '#84cc16',        text: 'Strong',     textColor: '#84cc16' },
      { pct: '100%',color: 'var(--success)', text: 'Very strong',textColor: 'var(--success)' },
    ];
    const lvl = levels[Math.min(score, 4)];
    fill.style.width = lvl.pct;
    fill.style.background = lvl.color;
    label.textContent = lvl.text;
    label.style.color = lvl.textColor;
  });

  document.getElementById('updateForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    clearAllFieldErrors(e.target);

    const newPw = document.getElementById('newPassword').value;
    const confirmPw = document.getElementById('confirmPassword').value;
    const btn = document.getElementById('updateBtn');

    let valid = true;
    if (!newPw || newPw.length < 8) { showFieldError('newPassword', 'Password must be at least 8 characters.'); valid = false; }
    if (newPw !== confirmPw) { showFieldError('confirmPassword', 'Passwords do not match.'); valid = false; }
    if (!valid) return;

    const client = getSupabase();
    if (!client) { showToast('Service unavailable. Please refresh.', 'error'); return; }

    setButtonLoading(btn, 'Updating…');

    try {
      const { error } = await client.auth.updateUser({ password: newPw });
      if (error) throw error;

      showToast('Password updated! Redirecting to dashboard…', 'success');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
    } catch (err) {
      console.error('[Grindpoint] Update password error:', err);
      showToast(err.message || 'Failed to update password. Please try again.', 'error');
    } finally {
      clearButtonLoading(btn);
    }
  });
</script>
