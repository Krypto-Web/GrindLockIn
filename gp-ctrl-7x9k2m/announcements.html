<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>

  <link rel="stylesheet" href="../css/style.css"/>
  <style>.admin-sidebar .sidebar__link.active{color:var(--error);background:var(--error-bg);}.admin-sidebar .sidebar__link.active::before{background:var(--error);}</style>
</head>
<body style="visibility:hidden">
<nav class="navbar" style="border-bottom-color:rgba(239,68,68,.25);">
  <div class="navbar__inner">
    <div style="display:flex;align-items:center;gap:1rem;">
      <a href="../index.html" class="navbar__logo">Grind<span class="logo-accent">point</span></a>
      <span class="admin-badge">Admin Panel</span>
    </div>
    <div style="display:flex;align-items:center;gap:1rem;">
      <span id="adminName" style="font-size:.82rem;color:var(--text-secondary);">Admin</span>
      <button onclick="signOut()" class="btn btn-secondary btn-sm">Sign Out</button>
    </div>
  </div>
</nav>
<div class="page-wrapper">
  <aside class="sidebar admin-sidebar">
    <nav class="sidebar__nav">
      <span class="sidebar__label">Overview</span>
      <a href="index.html" class="sidebar__link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
      <a href="analytics.html" class="sidebar__link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Analytics</a>
      <a href="fraud.html" class="sidebar__link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Fraud Detection</a>
      <span class="sidebar__label">Manage</span>
      <a href="users.html" class="sidebar__link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>All Users</a>
      <a href="task-submissions.html" class="sidebar__link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/></svg>Task Submissions</a>
      <a href="withdrawals.html" class="sidebar__link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>Withdrawals</a>
      <a href="tasks-admin.html" class="sidebar__link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/></svg>Task Manager</a>
      <a href="announcements.html" class="sidebar__link active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 17H2a3 3 0 000 6h20V17z"/><path d="M22 17V3l-4 4H2v10h20z"/></svg>Announcements</a>
      <a href="settings.html" class="sidebar__link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg>Settings</a>
    </nav>
  </aside>
  <main class="main-content">
    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;">
      <div>
        <h1 class="page-title">Announcements</h1>
        <p class="page-subtitle">Post platform-wide notices visible to all users.</p>
      </div>
      <button class="btn btn-primary" id="newBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:15px;height:15px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Announcement
      </button>
    </div>
    <div id="annList"><div class="skeleton" style="height:80px;border-radius:12px;margin-bottom:.75rem;"></div><div class="skeleton" style="height:80px;border-radius:12px;"></div></div>
  </main>
</div>

<div class="modal" id="annModal">
  <div class="modal__box">
    <div class="modal__header">
      <h3 class="modal__title">New Announcement</h3>
      <button class="modal__close" onclick="closeModal('annModal')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal__body" style="display:flex;flex-direction:column;gap:1rem;">
      <div class="form-group"><label class="form-label">Title</label><input type="text" id="aTitle" class="form-control" placeholder="Announcement title…"/></div>
      <div class="form-group"><label class="form-label">Message</label><textarea id="aBody" class="form-control" rows="4" placeholder="Write your message…" style="resize:vertical;"></textarea></div>
      <div class="form-group"><label class="form-label">Type</label>
        <select id="aType" class="form-control"><option value="info">ℹ️ Info</option><option value="warning">⚠️ Warning</option><option value="success">✅ Success</option><option value="promo">🎉 Promotion</option></select>
      </div>
      <div style="display:flex;align-items:center;gap:.75rem;"><input type="checkbox" id="aActive" checked style="accent-color:var(--gold-500);"/><label for="aActive" style="font-size:.875rem;">Publish immediately</label></div>
    </div>
    <div class="modal__footer">
      <button class="btn btn-secondary" onclick="closeModal('annModal')">Cancel</button>
      <button class="btn btn-primary" id="saveAnnBtn">Publish</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/main.js"></script>
<script>
let _anns = [];

document.addEventListener("DOMContentLoaded", async () => {
  const auth = await requireAdmin();
  if (!auth) return;
  document.getElementById("adminName").textContent = auth.profile?.full_name || "Admin";
  await load();
});

async function load() {
  const { data, error } = await getSupabase().from("announcements").select("*").order("created_at",{ascending:false});
  _anns = data || [];
  if (error) { document.getElementById("annList").innerHTML = `<div class="card" style="color:var(--error);text-align:center;padding:2rem;">${error.message}</div>`; return; }
  render();
}

function render() {
  const icons = {info:"ℹ️",warning:"⚠️",success:"✅",promo:"🎉"};
  const bm    = {info:"badge-info",warning:"badge-gold",success:"badge-success",promo:"badge-gold"};
  document.getElementById("annList").innerHTML = _anns.length ? _anns.map(a=>`
    <div style="display:flex;align-items:flex-start;gap:1rem;padding:1.25rem;background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);margin-bottom:.75rem;${!a.is_active?'opacity:.55;':''}">
      <span style="font-size:1.5rem;flex-shrink:0;">${icons[a.type]||"ℹ️"}</span>
      <div style="flex:1;">
        <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.35rem;flex-wrap:wrap;">
          <strong style="font-size:.95rem;">${a.title}</strong>
          <span class="badge ${bm[a.type]||"badge-info"}">${a.type||"info"}</span>
          <span class="badge ${a.is_active?"badge-success":"badge-muted"}">${a.is_active?"Live":"Hidden"}</span>
        </div>
        <p style="font-size:.85rem;color:var(--text-secondary);">${a.body||""}</p>
        <p style="font-size:.73rem;color:var(--text-muted);margin-top:.4rem;">${a.created_at?new Date(a.created_at).toLocaleString("en-NG"):""}</p>
      </div>
      <div style="display:flex;gap:.4rem;flex-shrink:0;">
        <button class="btn btn-secondary btn-sm" onclick="toggle('${a.id}',${a.is_active})">${a.is_active?"Hide":"Show"}</button>
        <button class="btn btn-danger btn-sm" onclick="del('${a.id}')">Delete</button>
      </div>
    </div>`).join("") : `<div class="empty-state"><div class="empty-state__icon">📢</div><div class="empty-state__title">No announcements yet</div><div class="empty-state__desc">Create your first announcement above.</div></div>`;
}

document.getElementById("newBtn").addEventListener("click", () => openModal("annModal"));
initModalCloseOnBackdrop("annModal");

document.getElementById("saveAnnBtn").addEventListener("click", async () => {
  const btn = document.getElementById("saveAnnBtn");
  const title = document.getElementById("aTitle").value.trim();
  const body  = document.getElementById("aBody").value.trim();
  if (!title || !body) { showToast("Title and message are required.","warning"); return; }
  setButtonLoading(btn,"Publishing…");
  const sb = getSupabase();
  const { data, error } = await sb.from("announcements").insert({
    title, body,
    type:      document.getElementById("aType").value,
    is_active: document.getElementById("aActive").checked,
    created_at: new Date().toISOString()
  }).select().maybeSingle();
  clearButtonLoading(btn);
  if (error) {
    console.error("[Admin] Announcement insert error:", error);
    if (error.code === "42501" || error.message.includes("RLS") || error.message.includes("policy")) {
      showToast("❌ Permission denied. Run supabase-admin-rls.sql in your Supabase SQL Editor first.", "error", 8000);
    } else {
      showToast("Failed: " + error.message, "error");
    }
    return;
  }
  if (data) _anns.unshift(data);
  render(); closeModal("annModal");
  document.getElementById("aTitle").value=""; document.getElementById("aBody").value="";
  showToast("Announcement published!", "success");
});

async function toggle(id, current) {
  const { error } = await getSupabase().from("announcements").update({is_active:!current}).eq("id",id);
  if (error) { showToast("Failed: "+error.message,"error"); return; }
  const i = _anns.findIndex(a=>a.id===id); if(i>-1) _anns[i].is_active=!current;
  render(); showToast(`Announcement ${!current?"shown":"hidden"}.`,"success");
}

async function del(id) {
  if (!confirm("Delete this announcement permanently?")) return;
  const { error } = await getSupabase().from("announcements").delete().eq("id",id);
  if (error) { showToast("Failed: "+error.message,"error"); return; }
  _anns = _anns.filter(a=>a.id!==id); render(); showToast("Deleted.","info");
}
</script>
</body>
</html>
