<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Withdrawals — Grindpoint Admin</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .admin-sidebar .sidebar__link.active{color:var(--error);background:var(--error-bg);}
    .admin-sidebar .sidebar__link.active::before{background:var(--error);}
  </style>
</head>
<body style="visibility:hidden">
<nav class="navbar" style="border-bottom-color:rgba(239,68,68,.25);">
  <div class="navbar__inner">
    <div style="display:flex;align-items:center;gap:1rem;">
      <a href="../index.html" class="navbar__logo">Grind<span class="logo-accent">point</span></a>
      <span class="admin-badge">Admin Panel</span>
    </div>
    <div style="display:flex;align-items:center;gap:1rem;">
      <span id="adminName" style="font-size:.82rem;color:var(--text-secondary);">Admin</span>
      <button onclick="signOut()" class="btn btn-secondary btn-sm">Sign Out</button>
    </div>
  </div>
</nav>
<div class="page-wrapper">
  <aside class="sidebar admin-sidebar">
    <nav class="sidebar__nav">
      <span class="sidebar__label">Overview</span>
      <a href="index.html" class="sidebar__link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
      <span class="sidebar__label">Manage</span>
      <a href="users.html" class="sidebar__link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>All Users</a>
      <a href="task-submissions.html" class="sidebar__link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/></svg>Task Submissions</a>
      <a href="withdrawals.html" class="sidebar__link active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>Withdrawals</a>
      <a href="tasks-admin.html" class="sidebar__link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/></svg>Task Manager</a>
      <a href="announcements.html" class="sidebar__link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 17H2a3 3 0 000 6h20V17z"/></svg>Announcements</a>
      <a href="payment-proofs.html" class="sidebar__link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>Payment Proofs</a>
      <a href="blog-admin.html" class="sidebar__link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>Blog Manager</a>
      <a href="settings.html" class="sidebar__link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg>Settings</a>
    </nav>
  </aside>
  <main class="main-content">
    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;">
      <div>
        <h1 class="page-title">Withdrawal Requests</h1>
        <p class="page-subtitle" id="wdSummary">Loading…</p>
      </div>
      <div style="display:flex;gap:.75rem;align-items:center;">
        <select id="statusFilter" class="form-control" style="width:150px;">
          <option value="pending" selected>⏳ Pending</option>
          <option value="approved">✅ Approved</option>
          <option value="rejected">❌ Rejected</option>
          <option value="all">All</option>
        </select>
        <button class="btn btn-secondary btn-sm" onclick="load()">↻ Refresh</button>
      </div>
    </div>

    <div class="stats-grid mb-6" id="kpis" style="grid-template-columns:repeat(3,1fr);"></div>

    <div class="table-wrapper">
      <table class="data-table">
        <thead>
          <tr><th>User</th><th>Amount</th><th>Bank / Account</th><th>Method</th><th>Date</th><th>Status</th><th style="width:160px;">Actions</th></tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="7" style="text-align:center;padding:3rem;color:var(--text-muted);">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/main.js"></script>
<script>
let _rows = [];

document.addEventListener('DOMContentLoaded', async () => {
  const auth = await requireAdmin();
  if (!auth) return;
  document.getElementById('adminName').textContent = auth.profile?.full_name || 'Admin';
  await load();
});

async function load() {
  const sb = getSupabase();
  document.getElementById('tbody').innerHTML =
    '<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--text-muted);">Loading…</td></tr>';

  const { data, error } = await sb
    .from('withdrawal_requests')
    .select('*, profiles(full_name, email)')
    .order('created_at', { ascending: false });

  if (error) {
    const msg = error.code === '42501' || error.message?.includes('RLS')
      ? '❌ Permission denied — run supabase-emergency-fix.sql in Supabase SQL Editor'
      : '❌ ' + error.message;
    document.getElementById('tbody').innerHTML =
      `<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--error);">${msg}</td></tr>`;
    document.getElementById('wdSummary').textContent = 'Error loading withdrawals';
    document.getElementById('kpis').innerHTML = '';
    return;
  }

  _rows = data || [];
  refreshUI();
}

function refreshUI() {
  const filter   = document.getElementById('statusFilter').value;
  const pending  = _rows.filter(r => r.status === 'pending');
  const approved = _rows.filter(r => r.status === 'approved');
  const pendingAmount  = pending.reduce((s,r) => s+(r.amount||0), 0);
  const approvedAmount = approved.reduce((s,r) => s+(r.amount||0), 0);

  document.getElementById('wdSummary').textContent =
    `${_rows.length} total · ${pending.length} pending`;

  document.getElementById('kpis').innerHTML = `
    <div class="stat-card" style="${pending.length>0?'border-color:rgba(239,68,68,.3);':''}">
      <div class="stat-card__label">Pending</div>
      <div class="stat-card__value" style="${pending.length>0?'color:var(--error);':''}">${pending.length}</div>
      <div class="stat-card__sub">${formatNaira(pendingAmount)} to pay</div>
    </div>
    <div class="stat-card stat-card--gold">
      <div class="stat-card__label">Approved</div>
      <div class="stat-card__value">${approved.length}</div>
      <div class="stat-card__sub">${formatNaira(approvedAmount)} paid</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__label">Total</div>
      <div class="stat-card__value">${_rows.length}</div>
      <div class="stat-card__sub">All requests</div>
    </div>`;

  const list = filter === 'all' ? _rows : _rows.filter(r => r.status === filter);
  const bm   = { pending:'badge-gold', approved:'badge-success', rejected:'badge-error' };

  if (!list.length) {
    document.getElementById('tbody').innerHTML =
      `<tr><td colspan="7" style="text-align:center;padding:3rem;color:var(--text-muted);">No withdrawal requests found.</td></tr>`;
    return;
  }

  document.getElementById('tbody').innerHTML = list.map(r => `
    <tr id="wdrow-${r.id}">
      <td>
        <div style="font-weight:600;font-size:.875rem;">${r.profiles?.full_name || 'Unknown'}</div>
        <div style="font-size:.73rem;color:var(--text-muted);">${r.profiles?.email || '—'}</div>
      </td>
      <td><strong style="color:var(--gold-500);font-size:1rem;">${formatNaira(r.amount)}</strong></td>
      <td>
        <div style="font-size:.85rem;font-weight:600;">${r.bank_name || '—'}</div>
        <div style="font-size:.75rem;color:var(--text-muted);font-family:monospace;">${r.account_number || '—'}</div>
        <div style="font-size:.75rem;color:var(--text-muted);">${r.account_name || '—'}</div>
      </td>
      <td style="font-size:.8rem;color:var(--text-muted);">${r.method || 'bank_transfer'}</td>
      <td style="font-size:.78rem;color:var(--text-muted);">${r.created_at ? new Date(r.created_at).toLocaleDateString('en-NG') : '—'}</td>
      <td><span class="badge ${bm[r.status]||'badge-muted'}">${r.status}</span></td>
      <td>
        ${r.status === 'pending' ? `
          <div style="display:flex;gap:.4rem;flex-wrap:wrap;">
            <button class="btn btn-sm" style="background:var(--success-bg);color:var(--success);border:1px solid rgba(34,197,94,.3);"
              onclick="process('${r.id}','approved')">✓ Paid</button>
            <button class="btn btn-danger btn-sm" onclick="process('${r.id}','rejected')">✗ Reject</button>
          </div>` : '<span style="font-size:.78rem;color:var(--text-muted);">—</span>'}
      </td>
    </tr>`).join('');
}

document.getElementById('statusFilter').addEventListener('change', refreshUI);

async function process(id, status) {
  const label = status === 'approved' ? 'Mark as paid and approve' : 'Reject';
  if (!confirm(`${label} this withdrawal?`)) return;

  const sb = getSupabase();
  const { error } = await sb.from('withdrawal_requests').update({
    status,
    processed_at: new Date().toISOString(),
  }).eq('id', id);

  if (error) {
    const msg = error.code === '42501' || error.message?.includes('RLS')
      ? '❌ Permission denied — run supabase-emergency-fix.sql in Supabase SQL Editor'
      : '❌ ' + error.message;
    showToast(msg, 'error', 8000);
    return;
  }

  /* Update local array IN PLACE — never re-fetch, never reverts */
  const idx = _rows.findIndex(r => r.id === id);
  if (idx > -1) {
    _rows[idx] = { ..._rows[idx], status, processed_at: new Date().toISOString() };
  }

  refreshUI();
  showToast(
    status === 'approved' ? '✅ Withdrawal marked as paid.' : '❌ Withdrawal rejected.',
    status === 'approved' ? 'success' : 'info'
  );
}
</script>
</body>
</html>
